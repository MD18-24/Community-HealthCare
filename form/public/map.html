<!-- public/map.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Care Map</title>

    <!-- Include Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        #map {
            height: 600px;
            /* Adjust the map height as needed */
        }
    </style>
</head>

<body>
    <h1>Health Care Location Map</h1>
    <div id="map"></div> <!-- This is where the map will be displayed -->

    <!-- Include Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Include the map.js script -->
    <script src="/map.js"></script> <!-- Link to the map.js in the scripts folder -->

</body>

</html>
