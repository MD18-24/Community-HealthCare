<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <script defer src="./regi.js"></script>
    <style>
        body{
            background-image: url("pexels-anete-lusina-6331082.jpg");
            background-repeat: no-repeat;
            background-size: 100%; 
        }

        #form{
            align-content: center;
            align-items: center;
            width: 50%;
            height: 50%;
            margin-left: auto;
            margin-right: auto;
            margin-top: 15%;
            vertical-align: middle;
            padding: 20px;
            background: linear-gradient(to right, #0f2070, #263c8f, #33467b);
            border-radius: 5px;
            font-size: 25;
            color: deepskyblue;
            text-align: center;
        }

        #form h1{
            color: aliceblue;
        }

        #form button{
            padding: 10px;
            margin-top: 10px;
            width: 50%;
            color: azure;
            background-color: aqua;
            border-radius: 5px;
        }

        .input-control{
            display: flex;
            flex-direction: column;
        }

        .input-control input{
            align-items: center;
            align-content: center;
            border: 3px solid #4ec3d7;
            border-radius: 3px;
            display: block;
            width: 95%;
            padding: 10px;
        }

        .input-control input:focus{
            outline: 0;
        }

        .input-control.success input{
            border-color: chartreuse;
        }

        .input-control.error input{
            border-color: darkred;
        }

        .input-control.error{
            color: darkred;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="form" class="form" action="savedata.php" method="post">
            <h1>Registration form</h1>
            <div class="input-control">
                <label for="username">Name</label>
                <input id="username" name="username" type="text">
                <div class="error"></div>
            </div>
            <div class="input-control">
                <label for="email">Email</label>
                <input id="email" name="email" type="email">
                <div class="error"></div>
            </div>
            <div class="input-control">
                <label for="phone">Phone number</label>
                <input id="phone" name="phone" type="tel">
                <div class="error"></div>
            </div>
            <button type="button" onclick="saveToExcel()">Generate OTP</button>
        </form>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.3/xlsx.full.min.js"></script>
        <script>
            function saveToExcel() {
                const name = document.getElementById("username").value;
                const em = document.getElementById("email").value;
                const pn = document.getElementById("phone").value;

                // Create an array of data
                const data = [
                    ['username', 'email', 'phone'],
                    [name, em, pn]
                ];

                // Create a new workbook and add the data
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');

                // Export the file
                XLSX.writeFile(wb, 'userdata.xlsx');
            }
        </script>
    </div>
</body>
</html>
